<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — ReadySet1600</title>
  <link rel="icon" type="image/png" href="favicon.png" id="favicon" />
  <script>
    window.addEventListener('load', function() {
      var img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = function() {
        var size = 64, c = document.createElement('canvas'); c.width = size; c.height = size;
        var ctx = c.getContext('2d'); ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
        document.getElementById('favicon').href = c.toDataURL('image/png');
      }; img.src = 'brand assets/newcirclelog.png';
    });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0B1728; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: #162236;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      transition: color 0.2s, background 0.2s;
    }
    .back-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .topbar h1 { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 800; color: #fff; margin: 0; letter-spacing: -0.03em; }
    .session-count { font-size: 12px; color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 3px 10px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .btn-primary { background: linear-gradient(135deg, #0F766E, #14B8A6); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; font-family: 'Outfit', sans-serif; padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s, transform 0.15s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.7); font-size: 13px; font-family: 'Outfit', sans-serif; padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: color 0.2s, background 0.2s; }
    .btn-secondary:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* ── Page body ── */
    .page-body { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* ── Legend ── */
    .legend {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: rgba(255,255,255,0.5); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.open { background: #F59E0B; }
    .legend-dot.mine { background: #14B8A6; }
    .legend-dot.taken { background: #6366F1; }

    /* ── Calendar grid ── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-bottom: 32px;
    }
    .cal-day-col {
      background: #162236;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
      min-height: 200px;
    }
    .cal-day-header {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .cal-day-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .cal-day-col.today .cal-day-name { color: #14B8A6; }
    .cal-day-col.today { border-color: rgba(20,184,166,0.25); }
    .cal-sessions { padding: 10px; display: flex; flex-direction: column; gap: 7px; }
    .cal-session-chip {
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      border: 1px solid transparent;
    }
    .cal-session-chip:hover { opacity: 0.85; transform: translateY(-1px); }
    .cal-session-chip.open {
      background: rgba(245,158,11,0.12);
      border-color: rgba(245,158,11,0.25);
    }
    .cal-session-chip.mine {
      background: rgba(20,184,166,0.15);
      border-color: rgba(20,184,166,0.35);
    }
    .cal-session-chip.taken {
      background: rgba(99,102,241,0.12);
      border-color: rgba(99,102,241,0.25);
    }
    .chip-time { font-weight: 600; margin-bottom: 2px; }
    .chip-time.open { color: #F59E0B; }
    .chip-time.mine { color: #14B8A6; }
    .chip-time.taken { color: #818CF8; }
    .chip-student { color: rgba(255,255,255,0.8); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-tutor { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-empty { padding: 16px 10px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.12); }

    /* ── List section ── */
    .list-title { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { font-size: 13px; font-family: 'Outfit', sans-serif; padding: 7px 14px; border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); transition: all 0.2s; }
    .filter-btn.active { background: rgba(20,184,166,0.15); border-color: rgba(20,184,166,0.4); color: #14B8A6; }
    .filter-btn:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.08); }

    /* ── Session list ── */
    .sessions-list { display: flex; flex-direction: column; gap: 8px; }
    .session-card {
      background: #162236;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.2s;
    }
    .session-card:hover { border-color: rgba(255,255,255,0.1); }
    .session-card.mine { border-color: rgba(20,184,166,0.3); background: rgba(20,184,166,0.04); }
    .session-card.taken { border-color: rgba(99,102,241,0.2); }

    .card-color-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
    .card-color-bar.open { background: #F59E0B; }
    .card-color-bar.mine { background: #14B8A6; }
    .card-color-bar.taken { background: #6366F1; }

    .card-time { min-width: 70px; flex-shrink: 0; }
    .card-time-main { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .card-day { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.05em; }
    .card-info { flex: 1; min-width: 0; }
    .card-student { font-weight: 600; font-size: 14px; color: #fff; }
    .card-notes { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .status-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .status-badge.open { background: rgba(245,158,11,0.12); color: #F59E0B; border: 1px solid rgba(245,158,11,0.2); }
    .status-badge.taken { background: rgba(99,102,241,0.1); color: #818CF8; border: 1px solid rgba(99,102,241,0.2); }
    .status-badge.mine-badge { background: rgba(20,184,166,0.15); color: #14B8A6; border: 1px solid rgba(20,184,166,0.3); }

    .claim-btn { font-size: 13px; font-weight: 600; font-family: 'Outfit', sans-serif; padding: 7px 14px; border-radius: 8px; cursor: pointer; border: none; background: linear-gradient(135deg, #0F766E, #14B8A6); color: #fff; transition: opacity 0.2s; white-space: nowrap; }
    .claim-btn:hover { opacity: 0.85; }
    .unclaim-btn { font-size: 13px; font-family: 'Outfit', sans-serif; padding: 7px 14px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); transition: color 0.2s, background 0.2s; white-space: nowrap; }
    .unclaim-btn:hover { color: #F87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.06); }
    .delete-btn { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.2s; }
    .delete-btn:hover { color: #F87171; }

    .empty-state { text-align: center; padding: 48px 32px; color: rgba(255,255,255,0.25); font-size: 14px; }
    .empty-state svg { margin: 0 auto 14px; display: block; opacity: 0.2; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(11,23,40,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.active { display: flex; }
    .modal-card { background: #162236; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 36px; width: 100%; max-width: 460px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); position: relative; }
    .modal-card h2 { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin: 0 0 20px; letter-spacing: -0.03em; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.5); cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: color 0.2s, background 0.2s; }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .form-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #fff; font-family: 'Outfit', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
    .form-input:focus { border-color: rgba(20,184,166,0.5); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    select.form-input option { background: #162236; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

    /* ── Auth / Loading ── */
    #auth-gate { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; color: rgba(255,255,255,0.4); font-size: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #14B8A6; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: none; position: fixed; inset: 0; z-index: 99999; background: rgba(11,23,40,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }

    @media (max-width: 900px) {
      .calendar-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0 12px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
      .topbar-left { gap: 8px; }
      .session-count { display: none; }
      .page-body { padding: 12px; }
      .calendar-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .filter-bar { gap: 6px; }
      .filter-btn { font-size: 12px; padding: 6px 10px; }
      .session-card { flex-wrap: wrap; gap: 10px; padding: 14px; }
      .card-actions { width: 100%; justify-content: flex-end; }
      .legend { gap: 12px; }
      .legend-item { font-size: 12px; }
    }
    @media (max-width: 400px) {
      .calendar-grid { grid-template-columns: 1fr 1fr 1fr; }
      .cal-session-chip { padding: 6px 7px; }
      .chip-student, .chip-tutor { display: none; }
    }
  </style>
  <script defer src="https://va.vercel-scripts.com/v1/script.js"></script>
</head>
<body>

<div id="auth-gate">
  <div class="spinner"></div>
  Checking authentication…
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn" onclick="goBack(event)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Dashboard
      </a>
      <h1>Session Schedule</h1>
      <span class="session-count" id="session-count">0 sessions</span>
    </div>
    <div class="topbar-right">
      <div id="cofounder-controls" style="display:none;">
        <button class="btn-primary" onclick="openAddModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Session
        </button>
      </div>
    </div>
  </div>

  <div class="page-body">

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot open"></div> Open</div>
      <div class="legend-item"><div class="legend-dot mine"></div> You're tutoring</div>
      <div class="legend-item"><div class="legend-dot taken"></div> Assigned to someone</div>
    </div>

    <!-- Calendar -->
    <div class="calendar-grid" id="calendar-grid"></div>

    <!-- List -->
    <div class="list-title">All Sessions</div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('open',this)">Open</button>
      <button class="filter-btn" onclick="setFilter('mine',this)">My Sessions</button>
      <button class="filter-btn" onclick="setFilter('taken',this)">Assigned</button>
    </div>
    <div class="sessions-list" id="sessions-list"></div>
  </div>
</div>

<!-- Add Session Modal -->
<div class="modal-overlay" id="session-modal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2>Add Session</h2>
    <div class="form-group">
      <label>Student Name</label>
      <input type="text" class="form-input" id="f-student" placeholder="Jane Smith" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Day of Week</label>
        <select class="form-input" id="f-day">
          <option value="">Select day…</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" class="form-input" id="f-time" />
      </div>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <input type="text" class="form-input" id="f-notes" placeholder="e.g. SAT Math, first session" />
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="addSession()">Add Session</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDy-g_ihlNGF19FVZ_-ChX-LfMIAZFKvYM",
    authDomain: "rs1600-faccd.firebaseapp.com",
    projectId: "rs1600-faccd",
    storageBucket: "rs1600-faccd.firebasestorage.app",
    messagingSenderId: "669933046930",
    appId: "1:669933046930:web:3179bd9fd14e3e2694ea4b"
  });
  const auth = firebase.auth();
  const db = firebase.firestore();

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const TODAY = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

  let sessions = [];
  let currentUser = null;
  let currentUserName = '';
  let isCofounder = false;
  let activeFilter = 'all';

  // ── Auth ──
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    currentUserName = user.email.split('@')[0]; // fallback
    db.collection('members').where('email', '==', user.email).limit(1).get().then(snap => {
      if (!snap.empty && snap.docs[0].data().name) currentUserName = snap.docs[0].data().name;
    });
    const userDoc = await db.collection('users').doc(user.uid).get();
    isCofounder = userDoc.exists && userDoc.data().role === 'cofounder';
    if (isCofounder) document.getElementById('cofounder-controls').style.display = 'flex';
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSessions();
  });

  function goBack(e) { e.preventDefault(); window.location.href = 'index.html?portal=1'; }

  // ── Load ──
  function loadSessions() {
    db.collection('sessions').orderBy('time').onSnapshot(snap => {
      sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    });
  }

  // ── Helpers ──
  function statusOf(s) {
    if (s.assignedTutorId === currentUser.uid) return 'mine';
    if (s.assignedTutorId) return 'taken';
    return 'open';
  }

  function formatTime(t) {
    if (!t) return '—';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    return `${h % 12 || 12}:${m.toString().padStart(2,'0')} ${ampm}`;
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escA(s) { return (s||'').replace(/'/g,"\\'"); }

  // ── Render calendar ──
  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = DAYS.map(day => {
      const daySessions = sessions
        .filter(s => s.day === day)
        .sort((a,b) => (a.time||'').localeCompare(b.time||''));

      const isToday = day === TODAY;
      const chipsHtml = daySessions.length === 0
        ? `<div class="cal-empty">—</div>`
        : daySessions.map(s => {
            const st = statusOf(s);
            return `<div class="cal-session-chip ${st}" onclick="scrollToCard('${s.id}')" title="${esc(s.studentName)}">
              <div class="chip-time ${st}">${formatTime(s.time)}</div>
              <div class="chip-student">${esc(s.studentName)}</div>
              ${st === 'mine' ? `<div class="chip-tutor">You</div>` : st === 'taken' ? `<div class="chip-tutor">${esc(s.assignedTutorName)}</div>` : `<div class="chip-tutor" style="color:rgba(245,158,11,0.5)">Open</div>`}
            </div>`;
          }).join('');

      return `<div class="cal-day-col${isToday ? ' today' : ''}">
        <div class="cal-day-header">
          <div class="cal-day-name">${day.slice(0,3)}</div>
        </div>
        <div class="cal-sessions">${chipsHtml}</div>
      </div>`;
    }).join('');
  }

  // ── Render list ──
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    let list = sessions;
    if (activeFilter === 'open') list = sessions.filter(s => !s.assignedTutorId);
    else if (activeFilter === 'mine') list = sessions.filter(s => s.assignedTutorId === currentUser.uid);
    else if (activeFilter === 'taken') list = sessions.filter(s => !!s.assignedTutorId);

    // Sort by day order then time
    list = [...list].sort((a,b) => {
      const di = DAYS.indexOf(a.day) - DAYS.indexOf(b.day);
      if (di !== 0) return di;
      return (a.time||'').localeCompare(b.time||'');
    });

    const el = document.getElementById('sessions-list');
    if (list.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>${activeFilter === 'mine' ? "You haven't claimed any sessions yet." : activeFilter === 'open' ? 'No open sessions.' : 'No sessions scheduled yet.'}</p>
      </div>`;
      return;
    }

    el.innerHTML = list.map(s => {
      const st = statusOf(s);
      let statusHtml = '';
      let actionHtml = '';
      if (st === 'mine') {
        statusHtml = `<span class="status-badge mine-badge">You're tutoring</span>`;
        actionHtml = `<button class="unclaim-btn" onclick="unclaimSession('${s.id}')">Unclaim</button>`;
      } else if (st === 'taken') {
        statusHtml = `<span class="status-badge taken">${esc(s.assignedTutorName)}</span>`;
      } else {
        statusHtml = `<span class="status-badge open">Open</span>`;
        actionHtml = `<button class="claim-btn" onclick="claimSession('${s.id}')">Claim</button>`;
      }
      const deleteBtn = isCofounder
        ? `<button class="delete-btn" onclick="deleteSession('${s.id}','${escA(s.studentName)}')" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`
        : '';

      return `<div class="session-card ${st}" id="card-${s.id}">
        <div class="card-color-bar ${st}"></div>
        <div class="card-time">
          <div class="card-time-main">${formatTime(s.time)}</div>
          <div class="card-day">${esc(s.day)}</div>
        </div>
        <div class="card-info">
          <div class="card-student">${esc(s.studentName)}</div>
          ${s.notes ? `<div class="card-notes">${esc(s.notes)}</div>` : ''}
        </div>
        <div class="card-actions">
          ${statusHtml}
          ${actionHtml}
          ${deleteBtn}
        </div>
      </div>`;
    }).join('');

    document.getElementById('session-count').textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
  }

  function renderAll() { renderCalendar(); renderList(); }

  function scrollToCard(id) {
    const el = document.getElementById('card-' + id);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.transition = 'border-color 0.3s'; el.style.borderColor = 'rgba(20,184,166,0.6)'; setTimeout(() => el.style.borderColor = '', 1500); }
  }

  // ── Firestore actions ──
  async function claimSession(id) {
    showLoading();
    try { await db.collection('sessions').doc(id).update({ assignedTutorId: currentUser.uid, assignedTutorName: currentUserName }); }
    catch(e) { alert('Error: ' + e.message); }
    hideLoading();
  }

  async function unclaimSession(id) {
    showLoading();
    try { await db.collection('sessions').doc(id).update({ assignedTutorId: null, assignedTutorName: null }); }
    catch(e) { alert('Error: ' + e.message); }
    hideLoading();
  }

  async function deleteSession(id, name) {
    if (!confirm(`Delete session for ${name}?`)) return;
    showLoading();
    await db.collection('sessions').doc(id).delete();
    hideLoading();
  }

  // ── Modal ──
  function openAddModal() {
    ['f-student','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-day').value = '';
    document.getElementById('f-time').value = '';
    document.getElementById('session-modal').classList.add('active');
    setTimeout(() => document.getElementById('f-student').focus(), 100);
  }

  function closeModal() { document.getElementById('session-modal').classList.remove('active'); }

  async function addSession() {
    const student = document.getElementById('f-student').value.trim();
    const day = document.getElementById('f-day').value;
    const time = document.getElementById('f-time').value;
    if (!student || !day || !time) { alert('Student name, day, and time are required.'); return; }
    showLoading();
    try {
      await db.collection('sessions').add({
        studentName: student, day, time,
        notes: document.getElementById('f-notes').value.trim(),
        assignedTutorId: null, assignedTutorName: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      closeModal();
    } catch(e) { alert('Error: ' + e.message); }
    hideLoading();
  }

  document.getElementById('session-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

  function showLoading() { document.getElementById('loading-overlay').classList.add('active'); }
  function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }
</script>
</body>
</html>
