<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultations — ReadySet1600</title>
  <link rel="icon" type="image/png" href="favicon.png" id="favicon" />
  <script>
    window.addEventListener('load', function() {
      var img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = function() {
        var size = 64, c = document.createElement('canvas'); c.width = size; c.height = size;
        var ctx = c.getContext('2d'); ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
        document.getElementById('favicon').href = c.toDataURL('image/png');
      }; img.src = 'brand assets/newcirclelog.png';
    });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0B1728; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; }

    /* ── Top bar ── */
    .topbar {
      background: #162236;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      transition: color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .back-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .topbar h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      margin: 0;
      letter-spacing: -0.03em;
    }
    .consult-count {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── Auth gate ── */
    #auth-gate {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 64px);
      font-size: 14px; color: rgba(255,255,255,0.3);
    }

    /* ── Main content ── */
    #app { display: none; padding: 32px; max-width: 1200px; margin: 0 auto; }

    /* ── Search ── */
    .search-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }
    .search-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px;
      padding: 10px 14px; outline: none; transition: border-color 0.2s; max-width: 360px;
    }
    .search-input:focus { border-color: rgba(20,184,166,0.4); }
    .search-input::placeholder { color: rgba(255,255,255,0.2); }

    /* ── Table ── */
    .table-wrap {
      background: #162236;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px;
    }
    thead th {
      text-align: left; padding: 12px 16px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.07);
      white-space: nowrap; background: rgba(255,255,255,0.02);
    }
    tbody td {
      padding: 12px 16px; color: rgba(255,255,255,0.75);
      border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.025); }

    /* ── Exam badge ── */
    .badge {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 6px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-SAT   { background: rgba(20,184,166,0.15);  color: #14B8A6; }
    .badge-SHSAT { background: rgba(139,92,246,0.15);  color: #A78BFA; }
    .badge-ACT   { background: rgba(251,146,60,0.15);  color: #FB923C; }
    .badge-AMC   { background: rgba(248,113,113,0.15); color: #F87171; }

    .td-dash { color: rgba(255,255,255,0.18); }
    .td-email { font-size: 12px; }
    tbody tr { cursor: pointer; }
    .done-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; padding: 4px 12px; color: rgba(255,255,255,0.4);
      border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
      transition: color 0.2s, background 0.2s, border-color 0.2s; white-space: nowrap;
    }
    .done-btn:hover { color: #10B981; background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }

    /* ── Detail modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(11,23,40,0.85); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: #162236; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 36px; width: 100%; max-width: 520px;
      position: relative; max-height: 85vh; overflow-y: auto;
    }
    .modal-card h2 {
      font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800;
      color: #fff; margin: 0 0 4px; letter-spacing: -0.03em;
    }
    .modal-meta { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 28px; }
    .modal-close {
      position: absolute; top: 16px; right: 16px; background: none; border: none;
      cursor: pointer; color: rgba(255,255,255,0.3); padding: 6px; border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .detail-field label {
      display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 4px;
    }
    .detail-field p {
      margin: 0; font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.5;
    }
    .detail-field.full { grid-column: 1 / -1; }
    .detail-notes {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 14px 16px; font-size: 14px; color: rgba(255,255,255,0.7);
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
      min-height: 60px;
    }
    .modal-footer { display: flex; justify-content: flex-end; margin-top: 28px; }
    .modal-done-btn {
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
      cursor: pointer; padding: 8px 20px; color: #10B981;
      border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
      transition: background 0.2s;
    }
    .modal-done-btn:hover { background: rgba(16,185,129,0.18); }

    .empty-state {
      padding: 48px; text-align: center; color: rgba(255,255,255,0.25); font-size: 14px;
    }

    /* ── Loading ── */
    .spinner {
      width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #14B8A6; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="window.location.href='index.html?portal=1'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <h1>Consultations</h1>
    <span class="consult-count" id="consult-count">—</span>
  </div>
</div>

<div id="auth-gate">
  <div class="spinner"></div>
</div>

<div id="app">
  <div class="search-bar">
    <input class="search-input" id="search-input" type="text" placeholder="Search by name, email, exam…" oninput="renderTable()" />
  </div>
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Grade</th>
            <th>Exam</th>
            <th>Current Score</th>
            <th>Target Score</th>
            <th>Referral</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeDetail()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 id="detail-name">—</h2>
    <div class="modal-meta" id="detail-meta">—</div>
    <div class="detail-grid">
      <div class="detail-field"><label>Email</label><p id="detail-email">—</p></div>
      <div class="detail-field"><label>Phone</label><p id="detail-phone">—</p></div>
      <div class="detail-field"><label>Grade</label><p id="detail-grade">—</p></div>
      <div class="detail-field"><label>Exam</label><p id="detail-exam">—</p></div>
      <div class="detail-field"><label>Current Score</label><p id="detail-current">—</p></div>
      <div class="detail-field"><label>Target Score</label><p id="detail-target">—</p></div>
      <div class="detail-field"><label>Referral Code</label><p id="detail-referral">—</p></div>
    </div>
    <div class="detail-field full">
      <label>Notes</label>
      <div class="detail-notes" id="detail-notes">—</div>
    </div>
    <div class="modal-footer">
      <button class="modal-done-btn" id="detail-done-btn">Done</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDy-g_ihlNGF19FVZ_-ChX-LfMIAZFKvYM",
    authDomain: "rs1600-faccd.firebaseapp.com",
    projectId: "rs1600-faccd",
    storageBucket: "rs1600-faccd.firebasestorage.app",
    messagingSenderId: "669933046930",
    appId: "1:669933046930:web:3179bd9fd14e3e2694ea4b"
  });
  const auth = firebase.auth();
  const db = firebase.firestore();

  let allConsultations = [];

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }

    // Only tutors/cofounders can access
    const userDoc = await db.collection('users').doc(user.uid).get();
    const role = userDoc.exists ? userDoc.data().role : null;
    if (role === 'tutee') { window.location.href = 'index.html'; return; }

    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadConsultations();
  });

  function loadConsultations() {
    db.collection('consultations').get().then(snap => {
      allConsultations = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => {
          const at = a.createdAt ? a.createdAt.toMillis() : 0;
          const bt = b.createdAt ? b.createdAt.toMillis() : 0;
          return bt - at;
        });
      renderTable();
    }).catch(() => {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="10" class="empty-state" style="color:#F87171;">Could not load data. Check Firestore permissions.</td></tr>';
    });
  }

  function openDetail(idx) {
    const c = allConsultations[idx];
    if (!c) return;
    const date = c.createdAt
      ? c.createdAt.toDate().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })
      : (c.submittedAt || '—');
    const grade = c.grade ? (isNaN(c.grade) ? c.grade : c.grade + 'th grade') : '—';
    const dash = v => v || '—';
    document.getElementById('detail-name').textContent = c.name || '—';
    document.getElementById('detail-meta').textContent = date;
    document.getElementById('detail-email').textContent = dash(c.email);
    document.getElementById('detail-phone').textContent = dash(c.phone);
    document.getElementById('detail-grade').textContent = grade;
    document.getElementById('detail-exam').textContent = dash(c.exam);
    document.getElementById('detail-current').textContent = dash(c.currentScore);
    document.getElementById('detail-target').textContent = dash(c.targetScore);
    document.getElementById('detail-referral').textContent = dash(c.referralCode);
    document.getElementById('detail-notes').textContent = c.notes || '—';
    document.getElementById('detail-done-btn').onclick = () => deleteConsultation(c.id);
    document.getElementById('detail-modal').classList.add('active');
  }

  function closeDetail() {
    document.getElementById('detail-modal').classList.remove('active');
  }

  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  function deleteConsultation(id) {
    db.collection('consultations').doc(id).delete().then(() => {
      allConsultations = allConsultations.filter(c => c.id !== id);
      closeDetail();
      renderTable();
    }).catch(() => alert('Could not delete. Check Firestore permissions.'));
  }

  function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const list = q
      ? allConsultations.filter(c =>
          (c.name || '').toLowerCase().includes(q) ||
          (c.email || '').toLowerCase().includes(q) ||
          (c.exam || '').toLowerCase().includes(q) ||
          (c.phone || '').toLowerCase().includes(q) ||
          (c.notes || '').toLowerCase().includes(q)
        )
      : allConsultations;

    document.getElementById('consult-count').textContent =
      `${allConsultations.length} request${allConsultations.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('tbody');
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No consultation requests yet.</td></tr>';
      return;
    }

    const dash = v => v ? v : '<span class="td-dash">—</span>';

    tbody.innerHTML = list.map(c => {
      const date = c.createdAt
        ? c.createdAt.toDate().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
        : (c.submittedAt || '—');
      const exam = c.exam || '';
      const badge = exam ? `<span class="badge badge-${exam}">${exam}</span>` : '<span class="td-dash">—</span>';
      const grade = c.grade ? (isNaN(c.grade) ? c.grade : c.grade + 'th') : '';
      const idx = allConsultations.indexOf(c);
      return `<tr onclick="openDetail(${idx})">
        <td style="white-space:nowrap; color:rgba(255,255,255,0.5); font-size:12px;">${date}</td>
        <td style="font-weight:500;">${dash(c.name)}</td>
        <td class="td-email">${dash(c.email)}</td>
        <td style="white-space:nowrap;">${dash(c.phone)}</td>
        <td>${dash(grade)}</td>
        <td>${badge}</td>
        <td>${dash(c.currentScore)}</td>
        <td>${dash(c.targetScore)}</td>
        <td>${dash(c.referralCode)}</td>
        <td onclick="event.stopPropagation()"><button class="done-btn" onclick="deleteConsultation('${c.id}')">Done</button></td>
      </tr>`;
    }).join('');
  }
</script>
</body>
</html>
