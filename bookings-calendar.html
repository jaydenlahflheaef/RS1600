<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings Calendar — ReadySet1600</title>
  <link rel="icon" type="image/png" href="favicon.png" id="favicon" />
  <script>
    window.addEventListener('load', function() {
      var img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = function() {
        var size = 64, c = document.createElement('canvas'); c.width = size; c.height = size;
        var ctx = c.getContext('2d'); ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
        document.getElementById('favicon').href = c.toDataURL('image/png');
      }; img.src = 'newcirclelog.png';
    });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0B1728; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: #162236;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      transition: color 0.2s, background 0.2s;
    }
    .back-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .topbar h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; margin: 0; letter-spacing: -0.03em; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    /* ── Stats row ── */
    .stats-row {
      display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .stat-chip {
      background: #162236; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 14px 20px;
      display: flex; flex-direction: column; gap: 4px; min-width: 120px;
    }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.03em; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

    /* ── Page body ── */
    .page-body { padding: 28px 32px; max-width: 1300px; margin: 0 auto; }

    /* ── Section title ── */
    .section-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }

    /* ── Calendar grid ── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-bottom: 36px;
    }
    .cal-day-col {
      background: #162236;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
      min-height: 180px;
    }
    .cal-day-col.today { border-color: rgba(20,184,166,0.3); }
    .cal-day-header {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .cal-day-name {
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .cal-day-col.today .cal-day-name { color: #14B8A6; }
    .cal-day-count {
      font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 3px;
    }
    .cal-day-col.today .cal-day-count { color: rgba(20,184,166,0.6); }
    .cal-sessions { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .cal-chip {
      border-radius: 8px; padding: 8px 10px; font-size: 11px; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s; border: 1px solid transparent;
    }
    .cal-chip:hover { opacity: 0.82; transform: translateY(-1px); }
    .chip-time { font-weight: 700; margin-bottom: 2px; }
    .chip-tutee { color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-tutor { color: rgba(255,255,255,0.4); font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-empty { padding: 16px 10px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.12); }

    /* ── Tutor color palette (up to 10 tutors) ── */
    .tc-0 { background: rgba(20,184,166,0.13); border-color: rgba(20,184,166,0.3); }
    .tc-0 .chip-time { color: #14B8A6; }
    .tc-1 { background: rgba(99,102,241,0.13); border-color: rgba(99,102,241,0.3); }
    .tc-1 .chip-time { color: #818CF8; }
    .tc-2 { background: rgba(245,158,11,0.13); border-color: rgba(245,158,11,0.3); }
    .tc-2 .chip-time { color: #FCD34D; }
    .tc-3 { background: rgba(236,72,153,0.13); border-color: rgba(236,72,153,0.3); }
    .tc-3 .chip-time { color: #F472B6; }
    .tc-4 { background: rgba(16,185,129,0.13); border-color: rgba(16,185,129,0.3); }
    .tc-4 .chip-time { color: #6EE7B7; }
    .tc-5 { background: rgba(239,68,68,0.13); border-color: rgba(239,68,68,0.3); }
    .tc-5 .chip-time { color: #FCA5A5; }
    .tc-6 { background: rgba(251,146,60,0.13); border-color: rgba(251,146,60,0.3); }
    .tc-6 .chip-time { color: #FDBA74; }
    .tc-7 { background: rgba(167,139,250,0.13); border-color: rgba(167,139,250,0.3); }
    .tc-7 .chip-time { color: #C4B5FD; }
    .tc-8 { background: rgba(34,211,238,0.13); border-color: rgba(34,211,238,0.3); }
    .tc-8 .chip-time { color: #67E8F9; }
    .tc-9 { background: rgba(163,230,53,0.13); border-color: rgba(163,230,53,0.3); }
    .tc-9 .chip-time { color: #BEF264; }

    /* ── Legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: rgba(255,255,255,0.5); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── List view ── */
    .bookings-list { display: flex; flex-direction: column; gap: 8px; }
    .booking-row {
      background: #162236; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.2s;
    }
    .booking-row:hover { border-color: rgba(255,255,255,0.1); }
    .booking-color-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
    .booking-time-col { min-width: 80px; flex-shrink: 0; }
    .booking-time-main { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .booking-day { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.05em; }
    .booking-people { flex: 1; min-width: 0; }
    .booking-tutee { font-weight: 600; font-size: 14px; color: #fff; }
    .booking-tutor { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .booking-tag { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

    /* ── Auth / Loading ── */
    #auth-gate { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; color: rgba(255,255,255,0.4); font-size: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #14B8A6; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 32px; color: rgba(255,255,255,0.25); font-size: 14px; }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      .calendar-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 600px) {
      .topbar { padding: 10px 16px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; }
      .page-body { padding: 16px; }
      .calendar-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-row { gap: 8px; }
      .stat-chip { padding: 12px 16px; min-width: 100px; }
      .stat-value { font-size: 22px; }
      .booking-row { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div id="auth-gate">
  <div class="spinner"></div>
  Checking authentication…
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html?portal=1" class="back-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Dashboard
      </a>
      <h1>Bookings Calendar</h1>
    </div>
    <div class="topbar-right">
      <span id="last-updated" style="font-size:12px;color:rgba(255,255,255,0.25);"></span>
    </div>
  </div>

  <div class="page-body">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-chip">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total Bookings</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value" id="stat-tutees">—</div>
        <div class="stat-label">Students</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value" id="stat-tutors">—</div>
        <div class="stat-label">Tutors</div>
      </div>
    </div>

    <!-- Legend -->
    <div class="section-title">Tutors</div>
    <div class="legend" id="legend"></div>

    <!-- Calendar -->
    <div class="section-title">Weekly View</div>
    <div class="calendar-grid" id="calendar-grid"></div>

    <!-- List -->
    <div class="section-title">All Bookings</div>
    <div class="bookings-list" id="bookings-list"></div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDy-g_ihlNGF19FVZ_-ChX-LfMIAZFKvYM",
    authDomain: "rs1600-faccd.firebaseapp.com",
    projectId: "rs1600-faccd",
    storageBucket: "rs1600-faccd.firebasestorage.app",
    messagingSenderId: "669933046930",
    appId: "1:669933046930:web:3179bd9fd14e3e2694ea4b"
  });
  const auth = firebase.auth();
  const db = firebase.firestore();

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const TODAY = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

  let bookings = [];
  let tutorColorMap = {};
  let colorIndex = 0;

  // Swatch colors matching the tc-N classes
  const SWATCH_COLORS = [
    '#14B8A6','#818CF8','#FCD34D','#F472B6','#6EE7B7',
    '#FCA5A5','#FDBA74','#C4B5FD','#67E8F9','#BEF264'
  ];

  // ── Auth ──
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    const userDoc = await db.collection('users').doc(user.uid).get();
    const role = userDoc.exists ? userDoc.data().role : '';
    if (role !== 'cofounder') {
      document.getElementById('auth-gate').innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:15px;">Access restricted to cofounders.</div>';
      return;
    }
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadBookings();
  });

  function getTutorColor(tutorUid) {
    if (tutorColorMap[tutorUid] === undefined) {
      tutorColorMap[tutorUid] = colorIndex % 10;
      colorIndex++;
    }
    return tutorColorMap[tutorUid];
  }

  function formatTime(t) {
    if (!t) return '—';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    return `${h % 12 || 12}:${m.toString().padStart(2,'0')} ${ampm}`;
  }

  function loadBookings() {
    db.collection('bookings').onSnapshot(snap => {
      bookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Sort by day then time
      bookings.sort((a, b) => {
        const di = DAYS.indexOf(a.day) - DAYS.indexOf(b.day);
        return di !== 0 ? di : (a.time || '').localeCompare(b.time || '');
      });
      // Assign colors in tutor-name order for consistency
      tutorColorMap = {}; colorIndex = 0;
      const tutorsSorted = [...new Set(bookings.map(b => b.tutorUid).filter(Boolean))];
      tutorsSorted.forEach(uid => getTutorColor(uid));
      renderAll();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    });
  }

  function renderStats() {
    const uniqueTutees = new Set(bookings.map(b => b.tuteeUid).filter(Boolean)).size;
    const uniqueTutors = new Set(bookings.map(b => b.tutorUid).filter(Boolean)).size;
    document.getElementById('stat-total').textContent  = bookings.length;
    document.getElementById('stat-tutees').textContent = uniqueTutees;
    document.getElementById('stat-tutors').textContent = uniqueTutors;
  }

  function renderLegend() {
    const seen = new Map(); // tutorUid → name
    bookings.forEach(b => { if (b.tutorUid && !seen.has(b.tutorUid)) seen.set(b.tutorUid, b.tutorName || b.tutorUid); });
    const legendEl = document.getElementById('legend');
    if (!seen.size) { legendEl.innerHTML = '<span style="font-size:13px;color:rgba(255,255,255,0.2);">No bookings yet.</span>'; return; }
    legendEl.innerHTML = [...seen.entries()].map(([uid, name]) => {
      const ci = getTutorColor(uid);
      return `<div class="legend-item">
        <div class="legend-swatch" style="background:${SWATCH_COLORS[ci]};"></div>
        ${name}
      </div>`;
    }).join('');
  }

  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = DAYS.map(day => {
      const dayBookings = bookings.filter(b => b.day === day);
      const isToday = day === TODAY;
      const count = dayBookings.length;

      const chipsHtml = dayBookings.length === 0
        ? `<div class="cal-empty">—</div>`
        : dayBookings.map(b => {
            const ci = getTutorColor(b.tutorUid);
            return `<div class="cal-chip tc-${ci}" onclick="scrollToRow('${b.id}')" title="${b.tuteeName || b.tuteeEmail || '—'} with ${b.tutorName || '—'}">
              <div class="chip-time">${formatTime(b.time)}</div>
              <div class="chip-tutee">${b.tuteeName || b.tuteeEmail || '—'}</div>
              <div class="chip-tutor">${b.tutorName || '—'}</div>
            </div>`;
          }).join('');

      return `<div class="cal-day-col${isToday ? ' today' : ''}">
        <div class="cal-day-header">
          <div class="cal-day-name">${day.slice(0,3)}</div>
          <div class="cal-day-count">${count} booking${count !== 1 ? 's' : ''}</div>
        </div>
        <div class="cal-sessions">${chipsHtml}</div>
      </div>`;
    }).join('');
  }

  function renderList() {
    const el = document.getElementById('bookings-list');
    if (!bookings.length) {
      el.innerHTML = `<div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block;opacity:0.2;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        No bookings yet.
      </div>`;
      return;
    }
    el.innerHTML = bookings.map(b => {
      const ci = getTutorColor(b.tutorUid);
      const color = SWATCH_COLORS[ci];
      return `<div class="booking-row" id="row-${b.id}">
        <div class="booking-color-bar" style="background:${color};"></div>
        <div class="booking-time-col">
          <div class="booking-time-main">${formatTime(b.time)}</div>
          <div class="booking-day">${b.day || '—'}</div>
        </div>
        <div class="booking-people">
          <div class="booking-tutee">${b.tuteeName || b.tuteeEmail || '—'}</div>
          <div class="booking-tutor">with ${b.tutorName || '—'}</div>
        </div>
        <div class="booking-tag" style="background:${color}22;color:${color};border:1px solid ${color}44;">
          ${b.tutorName ? b.tutorName.split(' ')[0] : '—'}
        </div>
      </div>`;
    }).join('');
  }

  function renderAll() {
    renderStats();
    renderLegend();
    renderCalendar();
    renderList();
  }

  function scrollToRow(id) {
    const el = document.getElementById('row-' + id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'border-color 0.3s';
      el.style.borderColor = 'rgba(20,184,166,0.6)';
      setTimeout(() => el.style.borderColor = '', 1500);
    }
  }
</script>
</body>
</html>
