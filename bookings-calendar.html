<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings Calendar — ReadySet1600</title>
  <link rel="icon" type="image/png" href="favicon.png" id="favicon" />
  <script>
    window.addEventListener('load', function() {
      var img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = function() {
        var size = 64, c = document.createElement('canvas'); c.width = size; c.height = size;
        var ctx = c.getContext('2d'); ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
        document.getElementById('favicon').href = c.toDataURL('image/png');
      }; img.src = 'newcirclelog.png';
    });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0B1728; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: #162236;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      transition: color 0.2s, background 0.2s;
    }
    .back-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .topbar h1 { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 800; color: #fff; margin: 0; letter-spacing: -0.03em; }

    /* ── Stats row ── */
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-chip { background: #162236; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 20px; display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
    .stat-value { font-family: 'DM Sans', sans-serif; font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.03em; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

    /* ── Legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: rgba(255,255,255,0.55); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── Page body ── */
    .page-body { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    .section-label { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 12px; }

    /* ══════════════════════════════════════
       CALENDAR
    ══════════════════════════════════════ */
    .cal-outer {
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      background: #111d2e;
      margin-bottom: 36px;
    }
    .cal-inner { min-width: 740px; }

    /* Header row */
    .cal-header {
      display: grid;
      grid-template-columns: 56px repeat(7, 1fr);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 64px;
      background: #131f30;
      z-index: 100;
    }
    .cal-header-corner { /* time gutter empty space */ }
    .cal-day-head {
      padding: 13px 8px 12px;
      text-align: center;
      border-left: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .cal-day-name {
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .cal-day-head.today .cal-day-name { color: #14B8A6; }
    .cal-day-count {
      font-size: 11px; color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      border-radius: 20px; padding: 1px 8px;
    }
    .cal-day-head.today .cal-day-count { color: rgba(20,184,166,0.7); background: rgba(20,184,166,0.08); }

    /* Body */
    .cal-body {
      display: grid;
      grid-template-columns: 56px repeat(7, 1fr);
    }

    /* Time gutter */
    .cal-time-col { display: flex; flex-direction: column; }
    .cal-time-slot {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding-right: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.02em;
      transform: translateY(-7px);
      user-select: none;
    }
    .cal-time-slot:first-child { visibility: hidden; }

    /* Day column */
    .cal-day-col {
      border-left: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }
    .cal-hour-line {
      position: absolute; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .cal-half-line {
      position: absolute; left: 0; right: 0; height: 1px;
      border-top: 1px dashed rgba(255,255,255,0.025);
      pointer-events: none;
    }
    .cal-now-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: rgba(20,184,166,0.7);
      z-index: 4;
      pointer-events: none;
    }
    .cal-now-dot {
      position: absolute; left: -3px; width: 8px; height: 8px;
      background: #14B8A6; border-radius: 50%;
      top: -3px; z-index: 4;
      pointer-events: none;
    }

    /* Events */
    .cal-event {
      position: absolute;
      border-radius: 7px;
      padding: 5px 8px;
      cursor: pointer;
      overflow: hidden;
      transition: filter 0.15s, transform 0.15s;
      border-left-width: 3px;
      border-left-style: solid;
      border-top: none; border-right: none; border-bottom: none;
    }
    .cal-event:hover { filter: brightness(1.15); transform: scale(1.01); z-index: 10; }
    .cal-event-time { font-size: 10px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; }
    .cal-event-tutee { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .cal-event-tutor { font-size: 10px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    /* Tutor color palette */
    .tc-0 { background: rgba(20,184,166,0.18);  border-left-color: #14B8A6; }  .tc-0 .cal-event-time { color: #14B8A6; }
    .tc-1 { background: rgba(99,102,241,0.18);  border-left-color: #818CF8; }  .tc-1 .cal-event-time { color: #818CF8; }
    .tc-2 { background: rgba(245,158,11,0.18);  border-left-color: #FCD34D; }  .tc-2 .cal-event-time { color: #FCD34D; }
    .tc-3 { background: rgba(236,72,153,0.18);  border-left-color: #F472B6; }  .tc-3 .cal-event-time { color: #F472B6; }
    .tc-4 { background: rgba(16,185,129,0.18);  border-left-color: #6EE7B7; }  .tc-4 .cal-event-time { color: #6EE7B7; }
    .tc-5 { background: rgba(239,68,68,0.18);   border-left-color: #FCA5A5; }  .tc-5 .cal-event-time { color: #FCA5A5; }
    .tc-6 { background: rgba(251,146,60,0.18);  border-left-color: #FDBA74; }  .tc-6 .cal-event-time { color: #FDBA74; }
    .tc-7 { background: rgba(167,139,250,0.18); border-left-color: #C4B5FD; }  .tc-7 .cal-event-time { color: #C4B5FD; }
    .tc-8 { background: rgba(34,211,238,0.18);  border-left-color: #67E8F9; }  .tc-8 .cal-event-time { color: #67E8F9; }
    .tc-9 { background: rgba(163,230,53,0.18);  border-left-color: #BEF264; }  .tc-9 .cal-event-time { color: #BEF264; }

    /* Auth gate */
    #auth-gate { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; color: rgba(255,255,255,0.4); font-size: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #14B8A6; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty day */
    .cal-empty-day { display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(255,255,255,0.08); height: 100%; pointer-events: none; }

    /* Mobile */
    @media (max-width: 600px) {
      .topbar { padding: 10px 16px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; }
      .page-body { padding: 16px; }
      .stats-row { gap: 8px; }
      .stat-chip { padding: 12px 14px; min-width: 90px; }
      .stat-value { font-size: 20px; }
    }
  </style>
</head>
<body>

<div id="auth-gate">
  <div class="spinner"></div>
  Checking authentication…
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html?portal=1" class="back-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Dashboard
      </a>
      <h1>Bookings Calendar</h1>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="last-updated" style="font-size:12px;color:rgba(255,255,255,0.22);"></span>
    </div>
  </div>

  <div class="page-body">

    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Bookings</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value" id="stat-tutees">—</div>
        <div class="stat-label">Students</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value" id="stat-tutors">—</div>
        <div class="stat-label">Tutors</div>
      </div>
    </div>

    <div class="section-label">Tutors</div>
    <div class="legend" id="legend"></div>

    <div class="section-label">Week View</div>
    <div class="cal-outer">
      <div class="cal-inner">
        <div class="cal-header" id="cal-header"></div>
        <div class="cal-body" id="cal-body"></div>
      </div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDy-g_ihlNGF19FVZ_-ChX-LfMIAZFKvYM",
    authDomain: "rs1600-faccd.firebaseapp.com",
    projectId: "rs1600-faccd",
    storageBucket: "rs1600-faccd.firebasestorage.app",
    messagingSenderId: "669933046930",
    appId: "1:669933046930:web:3179bd9fd14e3e2694ea4b"
  });
  const auth = firebase.auth();
  const db = firebase.firestore();

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const TODAY_NAME = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

  // Calendar constants
  const START_HOUR = 7;   // 7 AM
  const END_HOUR   = 22;  // 10 PM
  const HOUR_H     = 64;  // px per hour
  const TOTAL_H    = (END_HOUR - START_HOUR) * HOUR_H;

  const SWATCH = ['#14B8A6','#818CF8','#FCD34D','#F472B6','#6EE7B7',
                  '#FCA5A5','#FDBA74','#C4B5FD','#67E8F9','#BEF264'];

  let bookings = [];
  let tutorColorMap = {};
  let colorIdx = 0;

  // ── Auth ──
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    const doc = await db.collection('users').doc(user.uid).get();
    if (!doc.exists || doc.data().role !== 'cofounder') {
      document.getElementById('auth-gate').innerHTML =
        '<div style="color:rgba(255,255,255,0.4);font-size:15px;">Access restricted to cofounders.</div>';
      return;
    }
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadBookings();
  });

  function tutorColor(uid) {
    if (tutorColorMap[uid] === undefined) {
      tutorColorMap[uid] = colorIdx++ % 10;
    }
    return tutorColorMap[uid];
  }

  function timeToMins(t) {
    if (!t) return 0;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function fmtTime(t) {
    if (!t) return '—';
    const [h, m] = t.split(':').map(Number);
    return `${h % 12 || 12}:${m.toString().padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
  }

  function loadBookings() {
    db.collection('bookings').onSnapshot(snap => {
      bookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Assign colors in stable order
      tutorColorMap = {}; colorIdx = 0;
      const tutorUids = [...new Set(bookings.map(b => b.tutorUid).filter(Boolean))].sort();
      tutorUids.forEach(uid => tutorColor(uid));

      renderStats();
      renderLegend();
      renderCalendar();

      document.getElementById('last-updated').textContent =
        'Live · ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    });
  }

  function renderStats() {
    document.getElementById('stat-total').textContent  = bookings.length;
    document.getElementById('stat-tutees').textContent = new Set(bookings.map(b => b.tuteeUid).filter(Boolean)).size;
    document.getElementById('stat-tutors').textContent = new Set(bookings.map(b => b.tutorUid).filter(Boolean)).size;
  }

  function renderLegend() {
    const seen = new Map();
    bookings.forEach(b => { if (b.tutorUid && !seen.has(b.tutorUid)) seen.set(b.tutorUid, b.tutorName || '—'); });
    const el = document.getElementById('legend');
    if (!seen.size) {
      el.innerHTML = '<span style="font-size:13px;color:rgba(255,255,255,0.2);">No bookings yet.</span>';
      return;
    }
    el.innerHTML = [...seen.entries()].map(([uid, name]) =>
      `<div class="legend-item">
        <div class="legend-swatch" style="background:${SWATCH[tutorColor(uid)]};"></div>
        ${name}
      </div>`
    ).join('');
  }

  // ── Layout overlapping events within a day ──
  function layoutEvents(events) {
    // Sort by start time
    events = events.slice().sort((a, b) => timeToMins(a.time) - timeToMins(b.time));
    const DURATION = 55; // assumed duration in minutes

    // Build columns using greedy interval scheduling
    const cols = []; // each col = list of events placed there
    events.forEach(ev => {
      const start = timeToMins(ev.time);
      const end   = start + DURATION;
      let placed  = false;
      for (let i = 0; i < cols.length; i++) {
        const lastEnd = timeToMins(cols[i][cols[i].length - 1].time) + DURATION;
        if (start >= lastEnd) {
          cols[i].push(ev);
          ev._colIdx = i;
          placed = true;
          break;
        }
      }
      if (!placed) {
        ev._colIdx = cols.length;
        cols.push([ev]);
      }
    });

    const numCols = cols.length || 1;
    events.forEach(ev => {
      ev._numCols = numCols;
    });
    return events;
  }

  function renderCalendar() {
    // ── Header ──
    const header = document.getElementById('cal-header');
    header.innerHTML =
      `<div class="cal-header-corner"></div>` +
      DAYS.map(day => {
        const count = bookings.filter(b => b.day === day).length;
        const isToday = day === TODAY_NAME;
        return `<div class="cal-day-head${isToday ? ' today' : ''}">
          <div class="cal-day-name">${day.slice(0, 3)}</div>
          <div class="cal-day-count">${count}</div>
        </div>`;
      }).join('');

    // ── Build hours list ──
    const hours = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) hours.push(h);

    // ── Body ──
    const body = document.getElementById('cal-body');

    // Time gutter
    const timeColHtml =
      `<div class="cal-time-col">` +
      hours.map(h => {
        const label = h === 12 ? '12 PM' : h < 12 ? `${h} AM` : `${h - 12} PM`;
        return `<div class="cal-time-slot" style="height:${HOUR_H}px;">${label}</div>`;
      }).join('') +
      `</div>`;

    // Day columns
    const dayColsHtml = DAYS.map(day => {
      const dayBookings = layoutEvents(bookings.filter(b => b.day === day));
      const isToday = day === TODAY_NAME;

      // Hour lines
      let linesHtml = '';
      hours.forEach((h, i) => {
        const top = i * HOUR_H;
        linesHtml += `<div class="cal-hour-line" style="top:${top}px;"></div>`;
        if (i < hours.length - 1) {
          linesHtml += `<div class="cal-half-line" style="top:${top + HOUR_H / 2}px;"></div>`;
        }
      });

      // Current time indicator (today only)
      let nowHtml = '';
      if (isToday) {
        const now = new Date();
        const mins = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
        if (mins >= 0 && mins <= (END_HOUR - START_HOUR) * 60) {
          const top = (mins / 60) * HOUR_H;
          nowHtml = `<div class="cal-now-line" style="top:${top}px;"><div class="cal-now-dot"></div></div>`;
        }
      }

      // Event chips
      const eventsHtml = dayBookings.map(b => {
        const startMins = timeToMins(b.time) - START_HOUR * 60;
        if (startMins < 0 || startMins >= (END_HOUR - START_HOUR) * 60) return '';

        const top    = (startMins / 60) * HOUR_H + 2;
        const height = HOUR_H - 6; // ~58px per booking slot
        const ci     = tutorColor(b.tutorUid);

        const colW   = 100 / b._numCols;
        const left   = `calc(${b._colIdx * colW}% + 4px)`;
        const width  = `calc(${colW}% - 8px)`;

        return `<div class="cal-event tc-${ci}"
            style="top:${top}px;height:${height}px;left:${left};width:${width};"
            title="${b.tuteeName || b.tuteeEmail || '—'} · ${b.tutorName || '—'} · ${fmtTime(b.time)}">
          <div class="cal-event-time">${fmtTime(b.time)}</div>
          <div class="cal-event-tutee">${b.tuteeName || b.tuteeEmail || '—'}</div>
          <div class="cal-event-tutor">${b.tutorName || '—'}</div>
        </div>`;
      }).join('');

      const emptyHtml = dayBookings.length === 0
        ? `<div class="cal-empty-day" style="height:${TOTAL_H}px;">—</div>`
        : '';

      return `<div class="cal-day-col" style="height:${TOTAL_H}px;">
        ${linesHtml}
        ${nowHtml}
        ${eventsHtml}
        ${emptyHtml}
      </div>`;
    }).join('');

    body.innerHTML = timeColHtml + dayColsHtml;

    // Scroll to first booking or current time
    scrollCalendarToNow();
  }

  function scrollCalendarToNow() {
    const outer = document.querySelector('.cal-outer');
    if (!outer) return;
    const now = new Date();
    const mins = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
    // Scroll so current time (or 8am fallback) is near the top
    const target = Math.max(0, mins > 0 ? (mins / 60) * HOUR_H - 80 : HOUR_H);
    outer.scrollTop = target;
  }
</script>
</body>
</html>
